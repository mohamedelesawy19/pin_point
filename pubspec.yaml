name: pin_point
description: "Multiplayer geography party game: see a landmark, drop a pin, score points based on accuracy."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0

  # Storage
  flutter_secure_storage: ^10.3.1

  # UI
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  fake_async: ^1.3.3

  # Coverage
  coverage: ^1.15.0

flutter:
  uses-material-design: true
