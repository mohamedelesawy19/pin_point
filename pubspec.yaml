name: pin_point
description: "Multiplayer geography party game: see a landmark, drop a pin, score points based on accuracy."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0

  # Storage
  flutter_secure_storage: ^10.3.1

  # Image Caching
  cached_network_image: ^3.4.1

  # Dependency Injection
  get_it: ^9.2.1

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0

  # Third-Party Sign-In
  google_sign_in: ^7.2.0

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # UI
  cupertino_icons: ^1.0.9
  shimmer_animation: ^2.2.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  fake_async: ^1.3.3

  # Coverage
  coverage: ^1.15.0

  # Firestore Testing
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/google.png
